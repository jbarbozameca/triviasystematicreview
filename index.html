<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia de Revisiones Sistemáticas y Meta-análisis · Dr. Joshuan Barboza</title>
<meta name="description" content="Trivia interactiva por pestañas para autoevaluar revisiones sistemáticas y meta-análisis: PICO, elegibilidad, sesgos, forest plot, funnel plot, GRADE y más.">
<style>
:root{
  --bg:#eef3f8;
  --ink:#152330;
  --muted:#5d7284;
  --line:#dde6ee;
  --panel:#ffffff;
  --brand:#0a6e8a;
  --brand2:#13a3c6;
  --brand-d:#085c74;
  --accent:#f4a259;
  --ok:#1c8c5b;--ok-bg:#e6f7ee;
  --bad:#cf3a2b;--bad-bg:#fdecea;
  --warn:#b9770e;
  --shadow:0 14px 40px rgba(11,40,60,.10);
  --shadow-sm:0 4px 14px rgba(11,40,60,.08);
  --radius:18px;
  --sec:#0a6e8a; /* color de la sección activa, se sobreescribe por JS */
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased;
}
.wrap{max-width:1000px;margin:0 auto;padding:0 16px 70px}
h1,h2,h3,h4{line-height:1.2}

/* ---------- HERO ---------- */
.hero{
  position:relative;overflow:hidden;color:#eaf6fb;
  background:linear-gradient(135deg,#0a2a3a 0%,#0a6e8a 55%,#13a3c6 120%);
}
.hero .wrap{padding-top:30px;padding-bottom:26px}
.hero .kicker{letter-spacing:.2em;text-transform:uppercase;font-size:.7rem;font-weight:700;color:#8fe3f6}
.hero h1{font-size:2rem;margin:.25em 0 .15em;color:#fff;max-width:680px}
.hero .sub{margin:.1em 0;color:#cfe8f2}
.hero .author{color:#ffd9a8;font-weight:600}
.hero .badges{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px}
.hero .badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:4px 12px;font-size:.76rem;color:#eaf6fb}
.hero .deco{position:absolute;right:-10px;bottom:-20px;width:280px;opacity:.22;pointer-events:none}
@media(max-width:640px){.hero .deco{display:none}.hero h1{font-size:1.5rem}}

/* ---------- TABS ---------- */
.tabsbar{position:sticky;top:0;z-index:30;background:rgba(238,243,248,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.tabs{max-width:1000px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;padding:11px 16px;scrollbar-width:thin}
.tabs::-webkit-scrollbar{height:6px}
.tabs::-webkit-scrollbar-thumb{background:#c3d2de;border-radius:99px}
.tab{
  flex:0 0 auto;display:flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap;
  border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 15px;font-size:.86rem;
  font-weight:600;color:var(--ink);transition:.15s;
}
.tab .ic{font-size:1.05rem;line-height:1}
.tab:hover{border-color:var(--brand2);transform:translateY(-1px)}
.tab.on{color:#fff;border-color:transparent;box-shadow:var(--shadow-sm)}

/* ---------- CARDS ---------- */
.card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px;margin:20px 0}
.card.tight{padding:20px}
.lead{color:var(--muted);margin:.2em 0 1em}
.muted{color:var(--muted);font-size:.86rem}

/* Section hero card */
.sec-hero{display:flex;gap:20px;align-items:center;border-radius:var(--radius);overflow:hidden;
  background:linear-gradient(135deg,#fff, #fbfdff);border:1px solid var(--line);box-shadow:var(--shadow);padding:24px;margin:20px 0}
.sec-hero .emoji{flex:0 0 78px;height:78px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2.3rem;
  background:var(--sec);color:#fff;box-shadow:0 8px 22px rgba(10,60,80,.25)}
.sec-hero h2{margin:.05em 0 .2em;font-size:1.5rem}
.sec-hero .desc{color:var(--muted);margin:0;font-size:.96rem}
.sec-illus{margin:0 0 18px;border-radius:14px;border:1px solid var(--line);background:#fafdff;padding:14px;text-align:center}
.sec-illus svg{max-width:100%;height:auto}
.sec-illus .cap{font-size:.78rem;color:var(--muted);margin-top:6px}

.chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:6px 0}
.chip{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:7px 15px;cursor:pointer;font-size:.85rem;color:var(--ink);transition:.15s}
.chip:hover{border-color:var(--brand2)}
.chip.on{background:var(--sec);color:#fff;border-color:var(--sec)}

.btn{border:0;border-radius:13px;padding:13px 24px;font-size:1rem;font-weight:700;cursor:pointer;color:#fff;background:var(--sec);transition:.15s;box-shadow:0 8px 18px rgba(10,80,100,.22)}
.btn:hover{filter:brightness(.94);transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn.ghost{background:#fff;color:var(--sec);border:2px solid var(--sec);box-shadow:none}
.btn.ghost:hover{background:rgba(0,0,0,.03)}
.btn.accent{background:var(--accent);color:#3a2a12;box-shadow:0 8px 18px rgba(244,162,89,.3)}
.btn.sm{padding:9px 16px;font-size:.9rem}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}

/* ---------- QUIZ ---------- */
.progress{height:9px;background:var(--line);border-radius:999px;overflow:hidden;margin:4px 0 18px}
.progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--sec),var(--brand2));transition:width .35s}
.qmeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;font-size:.76rem}
.tag{border-radius:999px;padding:3px 11px;font-weight:700}
.tag.count{background:#eef2f6;color:var(--muted)}
.tag.sec{background:color-mix(in srgb,var(--sec) 14%,#fff);color:var(--sec)}
.tag.basico{background:var(--ok-bg);color:var(--ok)}
.tag.intermedio{background:#fef3e0;color:var(--warn)}
.tag.avanzado{background:var(--bad-bg);color:var(--bad)}
.qtext{font-size:1.2rem;font-weight:650;margin:4px 0 18px}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;gap:13px;align-items:flex-start;border:2px solid var(--line);border-radius:13px;padding:14px 16px;cursor:pointer;background:#fff;transition:.12s;font-size:1rem}
.opt:hover{border-color:var(--brand2);background:#f7fbfd}
.opt .key{flex:0 0 28px;height:28px;border-radius:8px;background:#eef2f6;color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:800}
.opt.correct{border-color:var(--ok);background:var(--ok-bg)}
.opt.correct .key{background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
.opt.wrong .key{background:var(--bad);color:#fff}
.opt.disabled{cursor:default}
.opt.dim{opacity:.65}
.fb{margin-top:16px;border-radius:13px;padding:15px 17px;font-size:.95rem;display:none}
.fb.show{display:block}
.fb.good{background:var(--ok-bg);border-left:5px solid var(--ok)}
.fb.bad{background:var(--bad-bg);border-left:5px solid var(--bad)}
.fb h4{margin:0 0 6px;font-size:1.02rem}
.fb .why{margin-top:11px;padding-top:11px;border-top:1px dashed rgba(0,0,0,.13);color:#27343f}
.fb .src{margin-top:8px;font-size:.82rem;color:var(--muted);font-style:italic}
.navrow{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:20px}

/* ---------- SCORE ---------- */
.scorebox{text-align:center;padding:6px 0}
.ring{margin:6px auto 8px;width:128px;height:128px}
.score-msg{color:var(--muted);max-width:440px;margin:6px auto 0}
.bars{margin-top:18px;text-align:left}
.barline{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:.86rem}
.barline .lbl{flex:0 0 44%}
.barline .tr{flex:1;background:var(--line);border-radius:999px;height:11px;overflow:hidden}
.barline .tr>i{display:block;height:100%;background:var(--sec)}
.barline .pc{flex:0 0 48px;text-align:right;color:var(--muted)}

/* ---------- HOME grid ---------- */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:6px}
.home-card{position:relative;border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;background:#fff;transition:.15s;overflow:hidden}
.home-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.home-card .hc-ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;margin-bottom:10px}
.home-card h3{margin:.1em 0 .25em;font-size:1.02rem}
.home-card p{margin:0;font-size:.82rem;color:var(--muted)}
.home-card .hc-n{position:absolute;top:14px;right:16px;font-size:.74rem;font-weight:700;color:var(--muted)}
.home-card .stripe{position:absolute;left:0;top:0;bottom:0;width:5px}

/* ---------- TIAB ---------- */
.picos{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin:14px 0}
.picos .p{background:color-mix(in srgb,var(--sec) 8%,#fff);border:1px solid color-mix(in srgb,var(--sec) 18%,#fff);border-radius:11px;padding:10px 12px;font-size:.85rem}
.picos .p b{display:block;color:var(--sec);font-size:.7rem;letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.crit{display:flex;flex-direction:column;gap:9px;margin:10px 0}
.crit label{display:flex;gap:11px;align-items:flex-start;border:2px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;transition:.12s}
.crit label:hover{border-color:var(--brand2)}
.crit input{margin-top:3px;width:18px;height:18px;accent-color:var(--sec)}
.crit label.ok{border-color:var(--ok);background:var(--ok-bg)}
.crit label.err{border-color:var(--bad);background:var(--bad-bg)}
.crit .cfb{display:block;font-size:.82rem;margin-top:5px;color:#27343f}
.tiab{border:2px solid var(--line);border-radius:14px;padding:17px;margin:13px 0;background:#fff}
.tiab .ttl{font-weight:700;margin-bottom:6px}
.tiab .abs{font-size:.92rem;color:#33424f}
.tiab .actions{display:flex;gap:10px;margin-top:13px}
.tiab .verdict{margin-top:13px;border-radius:11px;padding:12px 14px;font-size:.9rem;display:none}
.tiab .verdict.show{display:block}
.tiab.ok{border-color:var(--ok)}
.tiab.err{border-color:var(--bad)}
.verdict.good{background:var(--ok-bg);border-left:5px solid var(--ok)}
.verdict.bad{background:var(--bad-bg);border-left:5px solid var(--bad)}
.scn-pick{display:flex;flex-direction:column;gap:12px}
.scn-card{border:2px solid var(--line);border-radius:14px;padding:17px;cursor:pointer;transition:.15s;background:#fff}
.scn-card:hover{border-color:var(--brand2);transform:translateY(-1px)}
.scn-card h3{margin:.1em 0 .3em;color:var(--sec)}
.scn-card .based{font-size:.8rem;color:var(--muted)}

.hidden{display:none!important}
footer.site{text-align:center;color:var(--muted);font-size:.82rem;padding:10px 16px 0}
footer.site a{color:var(--brand)}
</style>
</head>
<body>

<header class="hero">
  <div class="wrap">
    <div class="kicker">Autoevaluación · Medicina basada en evidencia</div>
    <h1>Trivia de Revisiones Sistemáticas y Meta-análisis</h1>
    <p class="sub">Clases del <span class="author">Dr. Joshuan J. Barboza</span></p>
    <div class="badges">
      <span class="badge">Investigador RENACYT</span>
      <span class="badge">Miembro Cochrane</span>
      <span class="badge">USIL · Universidad Señor de Sipán</span>
    </div>
  </div>
  <svg class="deco" viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <g stroke="#ffffff" stroke-width="3" fill="none" opacity="0.9">
      <line x1="120" y1="10" x2="120" y2="150" stroke-dasharray="5 5"/>
      <line x1="60" y1="30" x2="150" y2="30"/><rect x="100" y="24" width="12" height="12" fill="#ffffff"/>
      <line x1="80" y1="62" x2="180" y2="62"/><rect x="124" y="55" width="15" height="15" fill="#ffffff"/>
      <line x1="50" y1="96" x2="140" y2="96"/><rect x="88" y="90" width="12" height="12" fill="#ffffff"/>
    </g>
    <polygon points="95,130 140,123 185,130 140,137" fill="#ffd9a8"/>
  </svg>
</header>

<div class="tabsbar"><div class="tabs" id="tabs"></div></div>

<div class="wrap">
  <main id="panel"></main>
  <footer class="site">
    <p>Material educativo de autoevaluación · Dr. Joshuan J. Barboza · <a href="https://orcid.org/0000-0002-2896-1407" target="_blank" rel="noopener">ORCID 0000-0002-2896-1407</a></p>
  </footer>
</div>

<script>
/* ============================================================
   TRIVIA DE REVISIONES SISTEMÁTICAS Y META-ANÁLISIS
   Clases del Dr. Joshuan J. Barboza
   Banco de preguntas + módulo de elegibilidad (cribado TIAB)
   ============================================================
   Modelo de dato de cada pregunta:
   {
     sec: "<id de sección>",
     lvl: "basico" | "intermedio" | "avanzado",
     q:   "enunciado",
     opts:["A","B","C","D"],
     correct: <índice de la opción correcta>,
     fb:  ["fundamento opción A", ...],   // uno por opción
     why: "explicación general (opcional)",
     src: "estudio/fuente de referencia (opcional)"
   }
   ============================================================ */

const SECTIONS = [
  { id: "pico",          name: "Pregunta de investigación y PICO",     icon: "❓" },
  { id: "elegibilidad",  name: "Criterios de elegibilidad",            icon: "✅" },
  { id: "busqueda",      name: "Búsqueda y estrategia",                icon: "🔎" },
  { id: "seleccion",     name: "Selección de estudios y PRISMA",       icon: "🗂️" },
  { id: "extraccion",    name: "Extracción de datos",                  icon: "📋" },
  { id: "sesgo",         name: "Riesgo de sesgo (RoB2, NOS, QUADAS…)", icon: "⚖️" },
  { id: "efecto",        name: "Medidas de efecto (RR, OR, MD, SMD)",  icon: "📐" },
  { id: "modelos",       name: "Modelos de meta-análisis",             icon: "🧮" },
  { id: "heterogeneidad",name: "Heterogeneidad (I², Q, τ²)",           icon: "🌡️" },
  { id: "publicacion",   name: "Sesgo de publicación (funnel, Egger)", icon: "🫙" },
  { id: "forest",        name: "Interpretación del forest plot",       icon: "🌲" },
  { id: "grade",         name: "GRADE y certeza de la evidencia",      icon: "🏅" },
  { id: "tipos",         name: "Tipos de revisiones",                  icon: "🧭" },
  { id: "casos",         name: "Casos basados en estudios reales",     icon: "📚" }
];

const QUESTIONS = [
/* ===================== PICO ===================== */
{
  sec:"pico", lvl:"basico",
  q:"En el acrónimo PICO para una pregunta de intervención, ¿qué representa la letra «C»?",
  opts:["Condición clínica","Comparador o control","Contexto del estudio","Cumplimiento (adherencia)"],
  correct:1,
  fb:[
    "La condición clínica suele incluirse en la «P» (población/problema), no en la «C».",
    "Correcto: «C» es el comparador o grupo control frente al cual se evalúa la intervención.",
    "El contexto puede aparecer como «S» (setting) en variantes como PICOS, pero no es la «C» clásica.",
    "La adherencia es un aspecto de la intervención o un desenlace, no la «C»."
  ],
  why:"PICO = Population/Problem, Intervention, Comparison, Outcome. El comparador define la pregunta tanto como la intervención."
},
{
  sec:"pico", lvl:"intermedio",
  q:"Para una revisión de RCTs de sacubitrilo/valsartán vs IECA o ARA-II sobre función renal en insuficiencia cardiaca, ¿cuál es el COMPARADOR (C) del PICO?",
  opts:["Sacubitrilo/valsartán","IECA o ARA-II","Duplicación de la creatinina sérica","Pacientes con insuficiencia cardiaca"],
  correct:1,
  fb:[
    "Esa es la intervención (I), no el comparador.",
    "Correcto: el comparador son los IECA o ARA-II.",
    "Eso es un desenlace (O), no el comparador.",
    "Esa es la población (P), no el comparador."
  ],
  why:"En el estudio S5, I = sacubitrilo/valsartán, C = IECA/ARA-II, O = duplicación de creatinina, eGFR, hiperkalemia.",
  src:"S5. Sacubitril/valsartán y función renal"
},
{
  sec:"pico", lvl:"intermedio",
  q:"Una revisión sistemática de exactitud diagnóstica suele estructurar su pregunta con un esquema tipo PIRT/PIRD. ¿Qué representa la «R»?",
  opts:["Riesgo basal","Estándar de referencia (reference standard)","Resultado (outcome)","Reproducibilidad"],
  correct:1,
  fb:[
    "El riesgo basal no es un componente del esquema PIRT/PIRD.",
    "Correcto: en estudios de exactitud diagnóstica la «R» es el estándar de referencia con el que se compara la prueba índice.",
    "El outcome en diagnóstico se expresa como sensibilidad/especificidad, no como la «R».",
    "La reproducibilidad es una propiedad de la prueba, no el componente «R»."
  ],
  why:"En diagnóstico: P = pacientes, I = prueba índice, R = estándar de referencia, T/D = target (diagnóstico objetivo)."
},
{
  sec:"pico", lvl:"basico",
  q:"¿Cuál es la principal función de formular una buena pregunta PICO antes de iniciar la revisión?",
  opts:["Aumentar el número de estudios incluidos","Definir y delimitar los criterios de elegibilidad y la estrategia de búsqueda","Garantizar significancia estadística","Evitar la evaluación del riesgo de sesgo"],
  correct:1,
  fb:[
    "El objetivo no es maximizar el número de estudios, sino responder con precisión la pregunta.",
    "Correcto: el PICO es la base de los criterios de elegibilidad y de la estrategia de búsqueda.",
    "El PICO no determina ni garantiza la significancia estadística de los resultados.",
    "El riesgo de sesgo se evalúa siempre, con independencia del PICO."
  ]
},
{
  sec:"pico", lvl:"avanzado",
  q:"En el estudio de detección del virus mpox según el sitio de muestra, el objetivo era estimar proporciones (p. ej., % de muestras positivas por sitio). ¿Qué variante del marco de pregunta es más apropiada?",
  opts:["PICO con comparador activo","PECO de exposición-desenlace","CoCoPop (Condición, Contexto, Población) para estudios de prevalencia/proporción","PICOTS con seguimiento temporal"],
  correct:2,
  fb:[
    "No hay un comparador activo: es una revisión de proporciones, no de efecto de una intervención.",
    "PECO se usa para asociación exposición-desenlace, no para estimar una proporción.",
    "Correcto: CoCoPop (Condición, Contexto, Población) es el marco recomendado por JBI para revisiones de prevalencia/proporción.",
    "PICOTS añade tiempo y escenario a una pregunta de intervención, no aplica a una proporción descriptiva."
  ],
  why:"Las revisiones de proporción/prevalencia (como S3, mpox) usan marcos tipo CoCoPop en lugar de PICO de intervención.",
  src:"S3. Detección de mpox"
},

/* ===================== ELEGIBILIDAD ===================== */
{
  sec:"elegibilidad", lvl:"basico",
  q:"Los criterios de elegibilidad de una revisión sistemática se derivan principalmente de:",
  opts:["Los resultados de los estudios encontrados","La pregunta PICO(S) definida a priori","El factor de impacto de las revistas","El número de revisores disponibles"],
  correct:1,
  fb:[
    "Definir la elegibilidad según los resultados introduce sesgo de selección; deben fijarse a priori.",
    "Correcto: los criterios se derivan del PICO(S) y se establecen antes de la búsqueda.",
    "El factor de impacto no debe ser un criterio de inclusión/exclusión.",
    "El número de revisores afecta la logística, no la definición de elegibilidad."
  ]
},
{
  sec:"elegibilidad", lvl:"intermedio",
  q:"En el meta-análisis de insomnio y riesgo de depresión (estudios de cohorte prospectivos), se excluyeron los estudios con diseño retrospectivo y aquellos donde no se excluyó la depresión basal. ¿Por qué excluir a participantes con depresión al inicio?",
  opts:["Para reducir el tamaño muestral","Para asegurar la temporalidad: el insomnio debe preceder a la depresión (incidencia, no prevalencia)","Porque la depresión basal mejora la homogeneidad estadística","Porque los estudios retrospectivos son más caros"],
  correct:1,
  fb:[
    "No se busca reducir el tamaño muestral; eso debilitaría el estudio.",
    "Correcto: excluir la depresión basal garantiza que se mide depresión incidente y se preserva la secuencia temporal exposición→desenlace.",
    "No es una cuestión de homogeneidad estadística sino de validez causal/temporalidad.",
    "El costo no es la razón; es un asunto de validez del diseño prospectivo."
  ],
  why:"En cohortes prospectivas la exposición debe preceder al desenlace; incluir casos prevalentes rompería esa lógica.",
  src:"EJEMPLO 1. Insomnio y depresión (cohorte)"
},
{
  sec:"elegibilidad", lvl:"intermedio",
  q:"¿Cuál de los siguientes es típicamente un criterio de exclusión (no de inclusión) en una revisión de RCTs?",
  opts:["Ensayo aleatorizado controlado","Población adulta con la condición de interés","Resumen de congreso sin reporte completo de datos","Comparación contra placebo"],
  correct:2,
  fb:[
    "El diseño RCT suele ser criterio de inclusión, no de exclusión.",
    "La población diana es un criterio de inclusión.",
    "Correcto: resúmenes de congreso, cartas o comentarios sin datos completos suelen excluirse.",
    "La comparación contra placebo suele ser parte de la inclusión (comparador)."
  ]
},
{

    panel.querySelector("#back").onclick=()=>renderTiabList();
    const cl=panel.querySelector("#crit");
    curScn.criteria.options.forEach((o,i)=>{
      const lab=el("label");
      lab.innerHTML=`<input type="checkbox"><span><span>${o.text}</span><span class="cfb hidden"></span></span>`;
      lab.querySelector("input").onchange=e=>critChecked[i]=e.target.checked;
      cl.appendChild(lab);
    });
    panel.querySelector("#ccheck").onclick=checkCriteria;
    panel.querySelector("#goscreen").onclick=()=>{panel.querySelector("#sstep").classList.remove("hidden");renderTiabCards();panel.querySelector("#sstep").scrollIntoView({behavior:"smooth"});};
    window.scrollTo({top:0,behavior:"smooth"});
  }
  function checkCriteria(){
    let correct=0;const opts=curScn.criteria.options;
    panel.querySelectorAll("#crit label").forEach((lab,i)=>{
      const o=opts[i],right=critChecked[i]===o.include;
      lab.classList.remove("ok","err");lab.classList.add(right?"ok":"err");
      const cfb=lab.querySelector(".cfb");cfb.classList.remove("hidden");cfb.innerHTML=o.fb;
      if(right)correct++;
    });
    const total=opts.length,pct=Math.round(correct/total*100);
    const res=panel.querySelector("#cres");
    res.className="fb show "+(pct>=70?"good":"bad");
    res.innerHTML=`<h4>${correct}/${total} criterios correctos (${pct}%)</h4><div>Verde = acertaste si era inclusión o exclusión. Rojo = revisa el fundamento mostrado.</div>`;
    panel.querySelector("#cnext").classList.remove("hidden");
  }
  function renderTiabCards(){
    const list=panel.querySelector("#tiabs");list.innerHTML="";
    curScn._done=0;curScn._ok=0;
    curScn.articles.forEach(a=>{
      const card=el("div","tiab");
      card.innerHTML=`<div class="ttl">📄 ${a.title}</div><div class="abs">${a.abstract}</div>
        <div class="actions"><button class="btn ghost sm" data-d="include">✔ Incluir</button><button class="btn ghost sm" data-d="exclude">✘ Excluir</button></div>
        <div class="verdict"></div>`;
      const btns=card.querySelectorAll("button");
      btns.forEach(b=>b.onclick=()=>decideTiab(card,btns,a,b.dataset.d));
      list.appendChild(card);
    });
  }
  function decideTiab(card,btns,a,decision){
    if(card.dataset.answered)return;card.dataset.answered="1";
    btns.forEach(b=>b.disabled=true);
    const ok=decision===a.decision;card.classList.add(ok?"ok":"err");
    const v=card.querySelector(".verdict");v.className="verdict show "+(ok?"good":"bad");
    const lab=a.decision==="include"?"INCLUIR":"EXCLUIR";
    v.innerHTML=`<b>${ok?"✅ Correcto":"❌ Incorrecto"}</b> — Decisión correcta: <b>${lab}</b>.<br>${a.reason}`;
    curScn._done++;if(ok)curScn._ok++;
    if(curScn._done===curScn.articles.length){
      const s=panel.querySelector("#ssum"),pct=Math.round(curScn._ok/curScn._done*100);
      s.className="fb show "+(pct>=70?"good":"bad");
      s.innerHTML=`<h4>Cribado completado: ${curScn._ok}/${curScn._done} aciertos (${pct}%)</h4>
        <div>${pct>=70?"¡Buen ojo metodológico! Distingues bien qué entra y qué no.":"Repasa los criterios PICOS: muchos errores vienen de confundir población o diseño."}</div>
        <div style="margin-top:10px"><button class="btn sm" id="srest">↺ Reiniciar escenario</button> <button class="btn ghost sm" id="soth">Otros escenarios</button></div>`;
      s.classList.remove("hidden");
      panel.querySelector("#srest").onclick=()=>openScn(curScn.id);
      panel.querySelector("#soth").onclick=()=>renderTiabList();
    }
  }

  /* ---------- init ---------- */
  buildTabs();
  openTab("home");
})();
</script>
</body>
</html>
